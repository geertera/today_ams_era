<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Today</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --card: rgba(10, 10, 10, 0.62);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 46, 99, 0.18), transparent 34%),
        radial-gradient(circle at 78% 80%, rgba(124, 60, 255, 0.20), transparent 34%),
        linear-gradient(135deg, #111111 0%, #050505 58%, #190815 100%);
    }

    .background-accent {
      position: fixed;
      left: 50%;
      bottom: -420px;
      width: 920px;
      height: 920px;
      margin-left: -460px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 46, 99, 0.22), rgba(124, 60, 255, 0.13) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed;
      top: 58px;
      left: 72px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.18em;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--era-pink);
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      padding: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .frontpage {
      width: min(1180px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: 142px;
      line-height: 0.86;
      letter-spacing: -0.085em;
      font-weight: 800;
      text-transform: uppercase;
    }

    .accent-line {
      width: 280px;
      height: 8px;
      margin: 38px auto 42px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .clock {
      font-size: 118px;
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 300;
      margin-bottom: 18px;
    }

    .date-line {
      color: var(--muted);
      font-size: 31px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 46px;
    }

    .day-card {
      width: min(820px, 100%);
      min-height: 210px;
      padding: 42px 54px;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
      position: relative;
      overflow: hidden;
    }

    .day-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .card-label {
      color: var(--muted);
      font-size: 18px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .day-title {
      margin: 0;
      font-size: 54px;
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 800;
    }

    .status {
      color: var(--muted);
      font-size: 28px;
      line-height: 1.3;
      margin-top: 18px;
    }

    @media (max-width: 900px) {
      .brand-mark { top: 36px; left: 36px; }
      .page { padding: 36px; }
      .title { font-size: 78px; }
      .clock { font-size: 76px; }
      .date-line { font-size: 24px; }
      .day-card { padding: 34px; }
      .day-title { font-size: 36px; }
    }
  </style>
</head>

<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <section class="frontpage" aria-label="Today">
      <div class="eyebrow" id="weekday">Today</div>
      <h1 class="title">Today</h1>
      <div class="accent-line"></div>
      <div class="clock" id="clock">--:--</div>
      <div class="date-line" id="date-line">Loading date...</div>

      <div class="day-card" aria-label="What day is it">
        <div class="card-label">Day of the day</div>
        <h2 class="day-title" id="day-title">Loading...</h2>
      </div>
    </section>
  </main>

  <script>
    var CLOCK_OFFSET_MINUTES = 120;
    var STORAGE_KEY = 'era-today-single-cache';

    var FALLBACK_DAYS = {
      '01-01': 'New Year’s Day',
      '02-14': 'Valentine’s Day',
      '03-08': 'International Women’s Day',
      '03-20': 'International Day of Happiness',
      '04-22': 'Earth Day',
      '05-01': 'Labour Day',
      '05-04': 'Star Wars Day',
      '05-05': 'Liberation Day',
      '06-05': 'World Environment Day',
      '06-21': 'World Music Day',
      '07-17': 'World Emoji Day',
      '08-19': 'World Photography Day',
      '09-21': 'International Day of Peace',
      '10-01': 'International Coffee Day',
      '10-10': 'World Mental Health Day',
      '11-13': 'World Kindness Day',
      '12-05': 'Sinterklaas',
      '12-25': 'Christmas Day',
      '12-31': 'New Year’s Eve'
    };

    var TRANSLATIONS = [
      ['Dag van de', 'Day of the'],
      ['Dag van het', 'Day of the'],
      ['Dag van', 'Day of'],
      ['Wereld', 'World'],
      ['Internationale Dag voor', 'International Day for'],
      ['Internationale Dag van', 'International Day of'],
      ['Internationale', 'International'],
      ['Nationale', 'National'],
      ['Nederlandse', 'Dutch']
    ];

    function correctedNow() {
      return new Date(new Date().getTime() + CLOCK_OFFSET_MINUTES * 60000);
    }

    function twoDigits(number) {
      return number < 10 ? '0' + number : '' + number;
    }

    function updateClock() {
      var now = correctedNow();
      document.getElementById('clock').textContent = twoDigits(now.getHours()) + ':' + twoDigits(now.getMinutes());
      document.getElementById('weekday').textContent = now.toLocaleDateString('en-GB', { weekday: 'long' });
      document.getElementById('date-line').textContent = now.toLocaleDateString('en-GB', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
    }

    function clean(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function softTranslate(title) {
      var result = clean(title);
      for (var i = 0; i < TRANSLATIONS.length; i++) {
        result = result.split(TRANSLATIONS[i][0]).join(TRANSLATIONS[i][1]);
      }
      result = result.replace(/^De\s+/i, 'The ');
      result = result.replace(/^Het\s+/i, 'The ');
      return result;
    }

    function setDayTitle(title) {
      var finalTitle = clean(title) || 'A good day to make something nice';
      document.getElementById('day-title').textContent = finalTitle;
      localStorage.setItem(STORAGE_KEY, finalTitle);
    }

    function fallbackDay() {
      var now = correctedNow();
      var key = twoDigits(now.getMonth() + 1) + '-' + twoDigits(now.getDate());
      setDayTitle(FALLBACK_DAYS[key] || 'A good day to make something nice');
    }

    function parseFijneDagVan(text) {
      var cleaned = clean(text);
      var matches = cleaned.match(/(?:Dag van de|Dag van het|Dag van|Wereld|Internationale Dag|Nationale|Nederlandse)[A-ZÀ-ÿa-z0-9 '\-]+/g) || [];

      for (var i = 0; i < matches.length; i++) {
        var title = softTranslate(matches[i]);
        title = title.replace(/Vandaag.*/i, '').trim();
        if (title.length >= 6 && title.length <= 70) return title;
      }

      return '';
    }

    function loadSpecialDay() {
      var cached = localStorage.getItem(STORAGE_KEY);
      if (cached) document.getElementById('day-title').textContent = cached;

      var url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://www.fijnedagvan.nl/?_=' + new Date().getTime());
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 10000;

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            var parsed = parseFijneDagVan(xhr.responseText);
            if (parsed) setDayTitle(parsed);
            else if (!cached) fallbackDay();
          } else if (!cached) {
            fallbackDay();
          }
        }
      };

      xhr.onerror = function () { if (!cached) fallbackDay(); };
      xhr.ontimeout = function () { if (!cached) fallbackDay(); };
      xhr.send();
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadSpecialDay();
    setInterval(loadSpecialDay, 3600000);

    setTimeout(function () {
      window.location.reload();
    }, 21600000);
  </script>
</body>
</html>
