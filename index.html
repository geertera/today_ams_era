<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Today</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.66);
      --card: rgba(10,10,10,0.62);
      --border: rgba(255,255,255,0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      width:100%; height:100%; margin:0; overflow:hidden;
      color:var(--text); background:#050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at 50% 30%, rgba(255,46,99,0.18), transparent 34%),
        radial-gradient(circle at 78% 80%, rgba(124,60,255,0.20), transparent 34%),
        linear-gradient(135deg,#111,#050505,#190815);
    }

    .background-accent {
      position: fixed;
      left:50%; bottom:-420px;
      width:920px; height:920px;
      margin-left:-460px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,46,99,0.22), rgba(124,60,255,0.13) 42%, transparent 68%);
      z-index:0;
    }

    .brand-mark {
      position: fixed; top:58px; left:72px; z-index:2;
      display:flex; align-items:center; gap:14px;
      letter-spacing:0.18em; font-size:16px; font-weight:800; text-transform:uppercase;
    }

    .brand-dot { width:13px; height:13px; border-radius:50%; background:var(--era-pink); }

    .page {
      position:relative; z-index:1;
      height:100vh; width:100vw;
      display:flex; align-items:center; justify-content:center;
      text-align:center; padding:72px;
    }

    .title {
      font-size:140px;
      line-height:0.85;
      letter-spacing:-0.08em;
      font-weight:800;
      text-transform:uppercase;
      margin:0 0 30px;
    }

    .clock {
      font-size:110px;
      font-weight:300;
      letter-spacing:-0.07em;
      margin-bottom:10px;
    }

    .date-line {
      color:var(--muted);
      font-size:30px;
      font-weight:700;
      margin-bottom:40px;
    }

    .card {
      width:min(700px,100%);
      padding:40px;
      border-radius:32px;
      border:1px solid var(--border);
      background:var(--card);
      position:relative;
    }

    .card::before {
      content:"";
      position:absolute; top:0; left:0; right:0;
      height:6px;
      background:linear-gradient(90deg,var(--era-pink),var(--era-orange),var(--era-purple));
    }

    .label {
      color:var(--muted);
      font-size:18px;
      letter-spacing:0.2em;
      text-transform:uppercase;
      margin-bottom:16px;
    }

    .day {
      font-size:52px;
      font-weight:800;
      letter-spacing:-0.04em;
    }

    @media (max-width:900px) {
      .title { font-size:70px; }
      .clock { font-size:60px; }
      .date-line { font-size:22px; }
      .day { font-size:32px; }
    }
  </style>
</head>

<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <div>
      <h1 class="title" id="weekday">Friday</h1>
      <div class="clock" id="clock">--:--</div>
      <div class="date-line" id="date-line">May 8, 2026</div>

      <div class="card">
        <div class="label">Today is:</div>
        <div class="day" id="day-title">A day to make something nice</div>
      </div>
    </div>
  </main>

<script>
  var CLOCK_OFFSET_MINUTES = 120;

  var THEME_DAYS = {
    '01-01':'New Year’s Day',
    '01-04':'World Braille Day',
    '01-24':'Peanut Butter Day',
    '01-27':'International Holocaust Remembrance Day',

    '02-04':'World Cancer Day',
    '02-14':'Valentine’s Day',
    '02-21':'International Mother Language Day',
    '02-27':'International Polar Bear Day',

    '03-01':'World Compliment Day',
    '03-08':'International Women’s Day',
    '03-14':'Pi Day',
    '03-17':'St. Patrick’s Day',
    '03-20':'International Day of Happiness',
    '03-21':'World Poetry Day',
    '03-22':'World Water Day',

    '04-01':'April Fools’ Day',
    '04-07':'World Health Day',
    '04-11':'World Parkinson’s Day',
    '04-22':'Earth Day',
    '04-23':'World Book Day',

    '05-01':'Labour Day',
    '05-03':'World Press Freedom Day',
    '05-04':'Star Wars Day',
    '05-05':'Liberation Day',
    '05-12':'International Nurses Day',
    '05-15':'International Day of Families',
    '05-25':'Towel Day',

    '06-01':'International Children’s Day',
    '06-05':'World Environment Day',
    '06-08':'World Oceans Day',
    '06-14':'World Blood Donor Day',
    '06-20':'World Refugee Day',
    '06-21':'World Music Day',

    '07-01':'Keti Koti',
    '07-11':'World Population Day',
    '07-17':'World Emoji Day',
    '07-18':'Nelson Mandela Day',
    '07-30':'International Day of Friendship',

    '08-09':'Indigenous Peoples Day',
    '08-12':'International Youth Day',
    '08-13':'Left-Handers Day',
    '08-19':'World Photography Day',

    '09-08':'International Literacy Day',
    '09-10':'World Suicide Prevention Day',
    '09-21':'International Day of Peace',
    '09-22':'Car-Free Day',
    '09-27':'World Tourism Day',

    '10-01':'International Coffee Day',
    '10-04':'World Animal Day',
    '10-05':'World Teachers’ Day',
    '10-10':'World Mental Health Day',
    '10-11':'Coming Out Day',
    '10-16':'World Food Day',
    '10-31':'Halloween',

    '11-09':'Inventors’ Day',
    '11-11':'Science Day',
    '11-13':'World Kindness Day',
    '11-14':'World Diabetes Day',
    '11-19':'International Men’s Day',
    '11-20':'Universal Children’s Day',

    '12-01':'World AIDS Day',
    '12-05':'Sinterklaas',
    '12-10':'Human Rights Day',
    '12-14':'Monkey Day',
    '12-25':'Christmas Day',
    '12-31':'New Year’s Eve'
  };

  function correctedNow(){
    return new Date(new Date().getTime() + CLOCK_OFFSET_MINUTES*60000);
  }

  function two(n){ return n<10?'0'+n:n; }

  function update(){
    var now = correctedNow();

    document.getElementById('weekday').textContent = now.toLocaleDateString('en-US',{weekday:'long'});
    document.getElementById('clock').textContent = two(now.getHours())+':'+two(now.getMinutes());
    document.getElementById('date-line').textContent = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

    var key = two(now.getMonth()+1)+'-'+two(now.getDate());
    var day = THEME_DAYS[key] || 'A day to make something nice';
    document.getElementById('day-title').textContent = day;
  }

  update();
  setInterval(update,1000);
</script>

</body>
</html>
